<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>
  
  <!-- AI Letters -->
  <g transform="translate(256, 256)">
    <!-- Letter A -->
    <path d="M-120,-80 L-60,80 L-20,80 L-40,20 L-100,20 Z" fill="url(#aiGradient)"/>
    <path d="M-80,-40 L-60,0 L-100,0 Z" fill="url(#bgGradient)"/>
    
    <!-- Letter I -->
    <rect x="20" y="-80" width="40" height="160" rx="8" fill="url(#aiGradient)"/>
    
    <!-- Sparkle/Dot -->
    <circle cx="80" cy="-60" r="15" fill="#fbbf24"/>
    <circle cx="80" cy="-60" r="8" fill="#f59e0b"/>
  </g>
  
  <!-- Tech Grid Pattern (subtle) -->
  <g opacity="0.1">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="2"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="2"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="2"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="2"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="2"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="2"/>
  </g>
</svg>
